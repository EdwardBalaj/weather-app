apiVersion: v1
kind: Pod
metadata:
  name: weather-fetcher
  namespace: default
  labels:
    app: weather-fetcher
spec:
  restartPolicy: Always
  containers:
    - name: weather
      image: weather-app:latest
      imagePullPolicy: IfNotPresent
      ports:
        - containerPort: 8080
      env:
        - name: CITY
          value: "Berlin"
      resources:
        requests:
          cpu: "50m"
          memory: "32Mi"
        limits:
          cpu: "100m"
          memory: "64Mi"
